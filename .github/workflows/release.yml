name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: code-review-graph-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: code-review-graph-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: code-review-graph-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: code-review-graph-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/code-review-graph"
          if [ -f "${src}.exe" ]; then
            cp "${src}.exe" "${{ matrix.asset }}"
          else
            cp "${src}" "${{ matrix.asset }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
